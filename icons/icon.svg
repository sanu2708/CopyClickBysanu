<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B" />
      <stop offset="100%" stop-color="#FFD93D" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="36" fill="url(#bg)" />
  
  <!-- Stylized 'C' (Copy) -->
  <path d="M85 45C80 38 70 34 60 34C40 34 28 48 28 64C28 80 40 94 60 94C70 94 80 90 85 83" stroke="white" stroke-width="12" stroke-linecap="round" />
  
  <!-- Click/Pulse Effect -->
  <circle cx="85" cy="64" r="14" fill="white" fill-opacity="0.4">
    <animate attributeName="r" values="10;18;10" dur="2s" repeatCount="indefinite" />
    <animate attributeName="fill-opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- Inner 'Click' Dot -->
  <circle cx="85" cy="64" r="6" fill="white" />
  
  <!-- Clipboard Lines (Inside C) -->
  <rect x="45" y="54" width="20" height="4" rx="2" fill="white" fill-opacity="0.8" />
  <rect x="45" y="64" width="15" height="4" rx="2" fill="white" fill-opacity="0.8" />
  <rect x="45" y="74" width="18" height="4" rx="2" fill="white" fill-opacity="0.8" />
</svg>
