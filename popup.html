<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copyclick by Sanu Singh</title>
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-area">
                <div class="logo-icon">
                    <svg width="32" height="32" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="logo-bg" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#FF6B6B" />
                                <stop offset="100%" stop-color="#FFD93D" />
                            </linearGradient>
                        </defs>
                        <rect width="128" height="128" rx="36" fill="url(#logo-bg)" />
                        <path d="M85 45C80 38 70 34 60 34C40 34 28 48 28 64C28 80 40 94 60 94C70 94 80 90 85 83" stroke="white" stroke-width="12" stroke-linecap="round" />
                        <circle cx="85" cy="64" r="6" fill="white" />
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>Copyclick</h1>
                    <span class="author">by Sanu Singh</span>
                </div>
            </div>
            <button id="add-btn" class="btn-primary-round">+</button>
        </header>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="Search your clicks...">
        </div>

        <div id="clicks-list" class="clicks-list">
            <!-- Clicks will be rendered here -->
        </div>

        <footer>
            <div class="footer-actions">
                <button id="export-btn" title="Export Data">📤 Export</button>
                <button id="import-btn" title="Import Data">📥 Import</button>
                <input type="file" id="import-file" accept=".json" class="hidden">
            </div>
            <p>Tap on any click to copy it instantly.</p>
            <p class="credit">Made with <span class="heart">❤️</span> By Sanu Singh</p>
        </footer>
    </div>

    <!-- Add Click Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">New Click</h2>
                <button id="close-modal" class="btn-close">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="input-group">
                    <label>Title (Optional)</label>
                    <input type="text" id="new-title" placeholder="e.g. My Bio, Work Link...">
                </div>
                <div class="input-group">
                    <label>Content</label>
                    <textarea id="new-content" rows="4" placeholder="Paste your text or link here..."></textarea>
                    <div id="image-preview-container" class="hidden">
                        <img id="image-preview" src="" alt="Preview">
                        <button id="remove-image" class="btn-remove-img">&times;</button>
                    </div>
                </div>
                <div class="type-selector">
                    <button id="type-text" class="type-btn active">Text</button>
                    <button id="type-image" class="type-btn">Image</button>
                    <input type="file" id="file-input" accept="image/*" class="hidden">
                </div>
                <div class="quick-add">
                    <label>Quick Add</label>
                    <div class="char-grid">
                        <span>©</span><span>®</span><span>™</span><span>•</span>
                        <span>→</span><span>←</span><span>↑</span><span>↓</span>
                        <span>★</span><span>♥</span><span>✓</span><span>✗</span>
                    </div>
                </div>
                <button id="save-click" class="btn-save">Save Click</button>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
